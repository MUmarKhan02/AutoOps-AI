services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-autoops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autoops_secret}
      POSTGRES_DB: ${POSTGRES_DB:-autoops_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-autoops}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # No volume — Redis data is ephemeral, clears on restart
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend-csharp/AutoOpsAI
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
    environment:
      - ASPNETCORE_URLS=http://+:8000
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=autoops_db;Username=${POSTGRES_USER:-autoops};Password=${POSTGRES_PASSWORD:-autoops_secret}
      - Redis__ConnectionString=redis:6379
      - Jwt__SecretKey=${SECRET_KEY:-change-me-in-production}
      - Storage__UploadDir=/app/storage/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://autoops:${POSTGRES_PASSWORD:-autoops_secret}@db:5432/autoops_db
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - UPLOAD_DIR=/app/storage/uploads
    volumes:
      - ./storage:/app/storage
      - ./backend-python:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=2

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  postgres_data: